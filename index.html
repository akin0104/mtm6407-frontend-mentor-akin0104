<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Intro section with dropdown navigation</title>

  <link rel="stylesheet" href="style.css">
</head>


  <body>

  <nav>
  <img src="./images/logo.svg" alt="Snap Logo">

  <ul>
    <li class="dropdown">
      Features
      <ul class="dropdown-menu">
        <li>Todo List</li>
        <li>Calendar</li>
        <li>Reminders</li>
        <li>Planning</li>
      </ul>
    </li>

    <li class="dropdown">
      Company
      <ul class="dropdown-menu">
        <li>History</li>
        <li>Our Team</li>
        <li>Blog</li>
      </ul>
    </li>

    <li>Careers</li>
    <li>About</li>
  </ul>

  <div class="auth-buttons">
    <button class="login-btn">Login</button>
    <button class="register-btn">Register</button>
  </div>
</nav>

  <main class="hero">

    <div class="hero-content">

      <h1>Make<br>remote work</h1>

      <p>
        Get your team in sync, no matter your location.
        Streamline processes, create team rituals,
        and watch productivity soar.
      </p>

      <button class="learn-btn">Learn more</button>

      <div class="clients">
        <img src="./images/client-databiz.svg" alt="Databiz">
        <img src="./images/client-audiophile.svg" alt="Audiophile">
        <img src="./images/client-meet.svg" alt="Meet">
        <img src="./images/client-maker.svg" alt="Maker">
      </div>

    </div>

    <div class="hero-image">
      <img src="./images/image-hero-desktop.png" alt="Hero">
    </div>

  </main>

  <script src="script.js"></script>

</body>
